<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Account Approved</title>
</head>
<body style="margin:0;padding:0;background-color:#f4f6f8;">

<table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#f4f6f8;">
    <tr>
        <td align="center" style="padding:20px 10px;">

            <table width="600" cellpadding="0" cellspacing="0" border="0" style="background-color:#ffffff;">

                <!-- HEADER -->
                <tr>
                    <td align="center" style="background-color:#2E7D32;padding:20px;">
                        <span style="color:#ffffff;font-size:20px;font-weight:bold;font-family:Arial,sans-serif;">
                            Tài khoản được phê duyệt
                        </span>
                    </td>
                </tr>

                <!-- BODY -->
                <tr>
                    <td style="padding:30px 25px;font-family:Arial,sans-serif;font-size:14px;color:#333;line-height:1.6;">

                        <p style="margin:0 0 15px;">
                            Xin chào <strong th:text="${name}">Partner</strong>,
                        </p>

                        <p style="margin:0 0 15px;">
                            Tài khoản của bạn đã được
                            <span style="white-space:nowrap;">
                                <strong style="color:#2E7D32;">phê duyệt</strong>
                            </span>.
                        </p>

                        <p style="margin:0 0 20px;">
                            Bạn có thể đăng nhập và bắt đầu sử dụng hệ thống.
                        </p>

                        <!-- BUTTON -->
                        <table align="center" cellpadding="0" cellspacing="0" border="0" style="margin:20px auto;">
                            <tr>
                                <td bgcolor="#2E7D32" style="padding:12px 20px;">
                                    <a th:href="${loginUrl}"
                                       style="color:#ffffff;text-decoration:none;font-weight:bold;font-family:Arial,sans-serif;">
                                        ĐĂNG NHẬP
                                    </a>
                                </td>
                            </tr>
                        </table>

                        <p style="margin-top:20px;">
                            Trân trọng,<br/>
                            <strong>Ecoverse Team</strong>
                        </p>

                    </td>
                </tr>

                <!-- FOOTER -->
                <tr>
                    <td align="center" style="background:#f0f0f0;padding:15px;font-size:12px;color:#777;font-family:Arial;">
                        © 2026 Ecoverse
                    </td>
                </tr>

            </table>

        </td>
    </tr>
</table>

</body>
</html>
